bundle:
  name: riddor-app

workspace:
  host: https://fevm-lr-serverless-aws-us.cloud.databricks.com
  profile: DEFAULT

sync:
  exclude:
    - .venv/
    - __pycache__/

targets:
  dev:
    mode: development
    default: true
    resources:
      apps:
        riddor-app:
          name: riddor-app-dev-lr
          description: "RIDDOR Decision Support Application"
          source_code_path: .
          permissions:
            - user_name: ${workspace.current_user.userName}
              level: CAN_MANAGE

  prod:
    resources:
      apps:
        riddor-app:
          name: riddor-app
          description: "RIDDOR Decision Support Application"
          source_code_path: .
          permissions:
            - user_name: ${workspace.current_user.userName}
              level: CAN_MANAGE
